name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Branch protection (Req 21.3–21.6 — document only; not settable from code)
#
# The following required status checks MUST be green before a pull request can
# merge to `main`. Configure these as "Required status checks" in
# GitHub → Settings → Branches → Branch protection rule for `main`:
#
#   - lint           (ESLint, zero warnings)
#   - typecheck      (tsc --noEmit)
#   - test           (Vitest unit + property; C1 Static_Cast_Guard and
#                     C2 Schema_Contract_Test ride along here — Req 21.1)
#   - sql-lint       (replay-order integrity + C4 Declared_Object_Check — Req 21.1)
#   - rls-smoke      (C3 RLS_Smoke_Test vs Supabase preview branch — Req 21.2)
#   - Supabase Preview (Supabase Branching — clean from-scratch migration replay)
#
# This mirrors the local pre-push gate (lint → tsc → vitest, see
# .kiro/steering/pre-push-checks.md). A red required check blocks the merge
# (Req 21.3, 21.6); an all-green run reports a mergeable pipeline (Req 21.5).
# These checks run on every pull request targeting `main` (Req 21.4) via the
# `on.pull_request` trigger above.
# ---------------------------------------------------------------------------

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Guard docs PDF Git attributes
        run: node scripts/check-docs-pdf-lfs.mjs

      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    # Part C: the C1 Static_Cast_Guard (src/__tests__/unit/supabaseCastGuard.test.ts)
    # and C2 Schema_Contract_Test (src/__tests__/unit/schemaContract.test.ts) are plain
    # Vitest files needing no secrets, so they ride this job automatically via the
    # default include glob in vite.config.ts (Req 21.1). The RLS integration smoke
    # suite is excluded here and runs in the dedicated `rls-smoke` job below.
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - name: Check for high/critical vulnerabilities
        run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities — review Dependabot alerts"
        continue-on-error: true

  lockfile-check:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Verify lockfile is in sync
        run: npm ci --ignore-scripts
        env:
          npm_config_audit: false

  lighthouse:
    name: Lighthouse CI
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Sentry source map upload (main branch only)
  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.SENTRY_ENABLED == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create Sentry release and upload sourcemaps
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          sourcemaps: ./dist/assets
          release: ${{ github.sha }}

  bundle-size:
    name: Bundle Size Check
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check bundle size with per-chunk breakdown
        run: |
          # Total gzipped JS budget across ALL chunks (including lazy-loaded
          # route chunks, not just initial load). Initial dashboard load is
          # enforced separately by Lighthouse CI. Raised to 1300KB after the
          # student-experience remediation added many new code-split routes
          # (planner, journal, leaderboard, habits, tutor, marketplace, teams).
          MAX_SIZE_KB=1300
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk | Raw (KB) | Gzipped (KB) |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|--------------|" >> $GITHUB_STEP_SUMMARY
          TOTAL_GZ=0
          for f in $(find dist/assets -name '*.js' | sort); do
            RAW_KB=$(wc -c < "$f" | awk '{printf "%.1f", $1/1024}')
            GZ_KB=$(gzip -c "$f" | wc -c | awk '{printf "%.1f", $1/1024}')
            GZ_INT=$(gzip -c "$f" | wc -c | awk '{printf "%.0f", $1/1024}')
            TOTAL_GZ=$((TOTAL_GZ + GZ_INT))
            BASENAME=$(basename "$f")
            echo "| $BASENAME | $RAW_KB | $GZ_KB |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total gzipped JS: ${TOTAL_GZ}KB / ${MAX_SIZE_KB}KB budget**" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Total gzipped JS: ${TOTAL_GZ}KB (budget: ${MAX_SIZE_KB}KB)"
          if [ "$TOTAL_GZ" -gt "$MAX_SIZE_KB" ]; then
            echo "::error::Bundle size ${TOTAL_GZ}KB exceeds budget of ${MAX_SIZE_KB}KB"
            exit 1
          fi

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'http://localhost:54321' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Check if Supabase backend is available
        id: backend
        run: |
          if [[ "$VITE_SUPABASE_URL" == "http://localhost:54321" ]]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E tests skipped — set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY secrets to enable"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        if: steps.backend.outputs.available == 'true'
        run: npx playwright test --project=chromium

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  sql-lint:
    name: SQL Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # Dev dependencies (incl. the `pg` Postgres driver) are needed by the
      # Declared_Object_Check step below once objects are declared in the manifest.
      - run: npm ci

      - name: Validate SQL migration syntax
        run: |
          echo "## SQL Migration Validation" >> $GITHUB_STEP_SUMMARY
          ERRORS=0
          for f in $(find supabase/migrations -name '*.sql' 2>/dev/null | sort); do
            # Check for common SQL syntax issues
            if grep -qiP '(CREATE\s+TABEL|DRPO\s+TABLE|ATLER\s+TABLE)' "$f" 2>/dev/null; then
              echo "::error file=$f::Possible SQL typo detected in $f"
              ERRORS=$((ERRORS + 1))
            fi
            # Check file is not empty
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Empty migration file: $f"
              ERRORS=$((ERRORS + 1))
            fi
            # Check for balanced parentheses
            OPEN=$(grep -o '(' "$f" | wc -l)
            CLOSE=$(grep -o ')' "$f" | wc -l)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "::warning file=$f::Unbalanced parentheses in $f (open: $OPEN, close: $CLOSE)"
            fi
          done
          echo "Checked $(find supabase/migrations -name '*.sql' 2>/dev/null | wc -l) migration files"
          echo "- Checked **$(find supabase/migrations -name '*.sql' 2>/dev/null | wc -l)** migration files" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS SQL issues"
            exit 1
          fi
          echo "- **All migrations passed validation**" >> $GITHUB_STEP_SUMMARY

      - name: Replay-order integrity (no too-early function refs — guards Supabase Preview)
        # A migration must never ALTER/REVOKE/GRANT/COMMENT a function (or attach a trigger
        # that EXECUTEs one) before the migration that CREATEs it. Such ordering aborts a
        # fresh replay (Supabase Preview / clean rebuild) with 42883 even though production
        # is fine. This catches that class statically, before the Supabase Preview check.
        run: node scripts/check-migration-replay-order.mjs

      - name: Declared-object existence check (C4 — Req 20, 21.1)
        # Verifies every DB object a completed task declares as created (materialized views,
        # functions, …) actually exists in the target schema — closing the "task checked off
        # before its migration applied" gap. With the current empty manifest this exits 0
        # WITHOUT needing a DB connection. Once Part A/B tasks append their objects to
        # scripts/declared-objects.json it connects via SUPABASE_DB_URL (the Supabase preview
        # branch DB URL, never production) to verify them. The secret is optional today: if it
        # is absent while the manifest is empty the check still passes; if objects are declared
        # but the secret is missing the check fails loudly, demanding the preview URL.
        run: node scripts/check-declared-objects.mjs
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

  rls-guard:
    name: RLS Multi-Tenant Isolation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Verify no cross-institution RLS leaks in migrations
        run: npx vitest --run src/__tests__/properties/rlsInstitutionIsolation.property.test.ts

  rls-smoke:
    name: RLS Smoke (Supabase preview)
    # Part C — C3 RLS_Smoke_Test (Req 19, 21.2). Runs the isolated integration suite
    # (vitest.integration.config.ts) which performs REAL per-role inserts/updates against a
    # Supabase PREVIEW branch — never production (a config-load guard aborts if SUPABASE_URL
    # resolves to the production project ref). The suite is skip-safe: when the preview
    # secrets are absent it marks itself describe.skip and the job stays GREEN, so the gate
    # is wired and ready but does not block merges until the secrets are configured. Once
    # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY are set (with
    # SUPABASE_DB_ENV=preview) the cases execute for real.
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_ENV: preview
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Run RLS insert/update smoke tests against the preview branch
        run: npm run test:rls
